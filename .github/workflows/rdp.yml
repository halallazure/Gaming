name: Ultimate-GPU-Gaming-V41-SYNC
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: 1. Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: 2. Extract, Convert, and Boot
        env:
          M_USER: ${{ secrets.MEGA_EMAIL }}
          M_PASS: ${{ secrets.MEGA_PASSWORD }}
        run: |
          # Go to the folder where the large download is located
          cd /content/actions-runner/_work/Gaming/Gaming/
          
          # Extract the disk from the OVA container if not already done
          if [ ! -f "win.qcow2" ]; then
            echo "Extracting OVA..."
            tar -xvf *.ova || true
            echo "Converting VMDK to QCOW2..."
            qemu-img convert -f vmdk -O qcow2 *.vmdk win.qcow2
            # Cleanup to save space
            rm -f *.vmdk *.ova
          fi

          echo "Booting VM with GPU Support..."
          qemu-system-x86_64 \
            -m 12G -smp 4 \
            -accel kvm:tcg \
            -cpu host \
            -drive file=win.qcow2,format=qcow2,if=virtio \
            -device virtio-vga \
            -usb -device usb-tablet \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389 \
            -nographic -vnc :0 &
          
          echo "VM Live. Your MEGA Sync is starting for: $M_USER"
          sleep 21600
