name: Ultimate-GPU-Gaming-VM
on: workflow_dispatch

jobs:
  run-vm:
    # Use these specific labels to match your Colab Runner
    runs-on: self-hosted
# Or to be safe, use:
# runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: Launch Windows with GPU
        run: |
          # Download the image
          curl -L -o win.qcow2 https://bit.ly/tinywin10_gpu 
          
          # Start Windows with Fixed USB and GPU acceleration
          qemu-system-x86_64 \
            -m 8G \
            -smp 4 \
            -drive file=win.qcow2,if=virtio,format=raw \
            -usb \
            -device usb-tablet \
            -device virtio-vga \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389 \
            -nographic -vnc :0
