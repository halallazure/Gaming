name: Ultimate-Gaming-VM-V11-COLAB-GPU
on: workflow_dispatch

jobs:
  build:
    runs-on: self-hosted  # <--- This connects to Colab
    steps:
      - name: Check GPU Power
        run: nvidia-smi  # This will prove you have an Nvidia T4 GPU
      
      - name: Start Gaming Environment
        run: |
          # Since Colab is Linux, you would use a Linux-based AnyDesk/Desktop setup here
          sudo apt-get update
          sudo apt-get install -y xfce4 xfce4-goodies
          # Install AnyDesk for Linux
          wget -qO - https://keys.anydesk.com/repos/DEB-GPG-KEY | sudo apt-key add -
          echo "deb http://deb.anydesk.com/ all main" | sudo tee /etc/apt/sources.list.d/anydesk-stable.list
          sudo apt-get update
          sudo apt-get install -y anydesk
