name: Ultimate-GPU-Gaming-V41-SYNC
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: 1. Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils unzip wget

      - name: 2. Download Official MS Image
        run: |
          # Official Microsoft VM Image (Direct & Permanent)
          wget -O win.zip "https://aka.ms/windev_VM_virtualbox"
          
          # Unzip to get the disk image
          unzip win.zip
          
          # Convert VirtualBox format to QCOW2 for QEMU
          qemu-img convert -f vmdk -O qcow2 *.vmdk win.qcow2
          
          # Check size
          ls -lh win.qcow2

      - name: 3. Boot with GPU & MEGA Sync
        env:
          M_USER: ${{ secrets.MEGA_EMAIL }}
          M_PASS: ${{ secrets.MEGA_PASSWORD }}
        run: |
          qemu-system-x86_64 \
            -m 12G -smp 4 \
            -accel kvm:tcg \
            -cpu host \
            -drive file=win.qcow2,format=qcow2,if=virtio \
            -device virtio-vga \
            -usb -device usb-tablet \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389,hostfwd=tcp::4444-:4444 \
            -nographic -vnc :0 &

          echo "VM Live. Syncing MEGA: $M_USER"
          sleep 21600 # 6-hour session
