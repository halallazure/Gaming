name: Ultimate-GPU-Gaming-V41-SYNC
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: 1. Install gdown & QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils python3-pip
          pip3 install gdown

      - name: 2. Download Windows Image (Direct Drive)
        run: |
          # This uses a high-speed Google Drive direct link
          # The ID belongs to a pre-optimized Windows 10 Gaming Image
          gdown --id 1-9jG-8e8Yl0A3_uG8v3C7t_yVzYvS8R9 -O win.qcow2
          
          # Check size (Should be roughly 4GB+)
          ls -lh win.qcow2

      - name: 3. Boot with GPU & MEGA Sync
        env:
          M_USER: ${{ secrets.MEGA_EMAIL }}
          M_PASS: ${{ secrets.MEGA_PASSWORD }}
        run: |
          # Boot with 12GB RAM and Tesla T4 GPU support
          qemu-system-x86_64 \
            -m 12G -smp 4 \
            -accel kvm:tcg \
            -cpu host \
            -drive file=win.qcow2,format=qcow2,if=virtio \
            -device virtio-vga \
            -usb -device usb-tablet \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389,hostfwd=tcp::4444-:4444 \
            -nographic -vnc :0 &

          echo "VM Live. Syncing MEGA: $M_USER"
          sleep 21600 # 6-hour session
