name: Ultimate-GPU-Gaming-V41-SYNC
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: 1. Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils

            - name: 2. Convert and Boot Disk
        run: |
          # 1. Navigate to the actual workspace folder
          cd /content/actions-runner/_work/Gaming/Gaming/
          
          # 2. Check if the disk is already converted
          if [ ! -f "win.qcow2" ]; then
            echo "Converting VMDK to QCOW2..."
            # Using a wildcard for the vmdk name to be safe
            qemu-img convert -f vmdk -O qcow2 *.vmdk win.qcow2
          fi

          echo "Booting VM..."
          qemu-system-x86_64 \
            -m 12G -smp 4 \
            -accel kvm:tcg \
            -cpu host \
            -drive file=win.qcow2,format=qcow2,if=virtio \
            -device virtio-vga \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389 \
            -nographic -vnc :0 &
          
          echo "VM Live. MEGA Syncing..."
          sleep 21600
