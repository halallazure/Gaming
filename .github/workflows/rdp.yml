name: Ultimate-GPU-Gaming-VM
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: Install QEMU and Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: Launch Windows with GPU
        run: |
          # 1. Download the image
          curl -L -o win.qcow2 https://bit.ly/tinywin10_gpu 
          
          # 2. Start Windows with Fixed USB and GPU acceleration
          # Added '-usb' to fix your error and 'format=raw' to fix the warning
          qemu-system-x86_64 \
            -m 8G \
            -smp 4 \
            -drive file=win.qcow2,format=raw \
            -usb \
            -device usb-tablet \
            -device virtio-vga \
            -net nic -net user,hostfwd=tcp::3389-:3389 \
            -nographic -vnc :0
