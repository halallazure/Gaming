name: Ultimate-GPU-Gaming-VM
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted  # This targets your Colab GPU machine
    steps:
      - name: Verify GPU Hardware
        run: nvidia-smi  # This proves the T4 GPU is active

      - name: Launch Windows with GPU Passthrough
        run: |
          # Download a specialized gaming-ready Windows image
          curl -L -o win.qcow2 https://bit.ly/tinywin10_gpu 
          
          # Start Windows with GPU acceleration enabled (-device virtio-vga)
          qemu-system-x86_64 \
            -m 8G \
            -smp 4 \
            -hda win.qcow2 \
            -device usb-tablet \
            -device virtio-vga \
            -net nic -net user,hostfwd=tcp::3389-:3389 \
            -nographic -vnc :0
