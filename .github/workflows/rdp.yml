name: Ultimate-Gaming-VM-V41-MAX-FPS
on: workflow_dispatch

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: 1. Launch 60FPS Windows Container
        run: |
          # Start the Windows container with GPU and KVM acceleration
          # We use 12GB RAM and 4 Cores to ensure Elden Ring/Cyberpunk stability
          docker run -d --name gaming_vm \
            --device /dev/kvm \
            --gpus all \
            -p 3389:3389 \
            -e VERSION=11 \
            -e RAM_SIZE=12G \
            -e CPU_CORES=4 \
            dockurr/windows

      - name: 2. Inject Gaming Configuration
        run: |
          # Wait for Windows to initialize
          echo "Waiting for Windows to boot..."
          sleep 60
          
          # This part "talks" to the Windows container to set up your AnyDesk/MEGA
          # It uses your logic but wrapped for the Docker environment
          docker exec -it gaming_vm powershell -Command "
            New-Item -Path 'C:\GamingVM\Startup' -ItemType Directory -Force;
            powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c;
            reg add 'HKEY_CURRENT_USER\Control Panel\Desktop' /v UserPreferencesMask /t REG_BINARY /d 9012038010000000 /f;
            curl.exe -L -o anydesk.exe https://download.anydesk.com/AnyDesk.exe;
            Start-Process ./anydesk.exe -ArgumentList '--install C:\AnyDesk --start-with-win --silent' -Wait;
            echo 'GitHub@2026' | & 'C:\AnyDesk\AnyDesk.exe' --set-password;
          "

      - name: 3. Connection & Stay Alive
        run: |
          # Get the ID and keep the Colab runner active
          echo "AnyDesk is ready. Connect using the ID from the Windows screen."
          docker exec -it gaming_vm powershell -Command "
            \$idFile = 'C:\ProgramData\AnyDesk\system.conf';
            while (!(Test-Path \$idFile)) { Start-Sleep -Seconds 5 };
            Select-String -Path \$idFile -Pattern 'ad.anynet.id=(.*)' | % { Write-Host 'ANYDESK ID: ' \$_.Matches.Groups[1].Value }
          "
          # Keep the job running forever
          sleep 1000000
