name: Ultimate-GPU-Gaming-VM
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: Launch Windows with GPU
        run: |
          # 1. Download a REAL bootable Windows image (approx 5GB)
          # The previous 4KB file was the reason for the 'No bootable device' error
          curl -L -o win.qcow2 https://app.vagrantup.com/f10lark/boxes/windows10/versions/1.0/providers/qemu.box
          
          # 2. Extract the actual qcow2 from the vagrant box
          tar -xf win.qcow2
          
          # 3. Boot with GPU Passthrough and AnyDesk Port Forwarding
          # -m 8G: Uses Colab RAM
          # -smp 4: Uses AMD EPYC Cores
          # hostfwd 3389: For RDP
          # hostfwd 4444: For AnyDesk/Custom
          qemu-system-x86_64 \
            -m 8G \
            -smp 4 \
            -drive file=box.img,format=qcow2,if=virtio \
            -usb -device usb-tablet \
            -device virtio-vga \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389,hostfwd=tcp::4444-:4444 \
            -boot c \
            -nographic -vnc :0
