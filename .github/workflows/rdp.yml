name: Ultimate-GPU-Gaming-V41-SYNC
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: 1. Clean Locks & Install QEMU
        run: |
          sudo rm -f /var/lib/dpkg/lock-frontend || true
          sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: 2. Download Bootable Windows (Direct Link)
        run: |
          # Downloading a RAW image directly - NO TAR NEEDED
          curl -L -o win.qcow2 "https://app.vagrantup.com/f10lark/boxes/windows10/versions/1.0/providers/qemu/box.img"
          
          # Verification: If size is small, stop the script
          FILESIZE=$(stat -c%s "win.qcow2")
          echo "Downloaded file size: $FILESIZE bytes"
          if [ $FILESIZE -lt 1000000000 ]; then exit 1; fi

      - name: 3. Boot with GPU & Fallback KVM
        env:
          M_USER: ${{ secrets.MEGA_EMAIL }}
          M_PASS: ${{ secrets.MEGA_PASSWORD }}
        run: |
          # -accel kvm:tcg fixes the 'KVM module not found' error
          qemu-system-x86_64 \
            -m 12G -smp 4 \
            -accel kvm:tcg \
            -cpu host \
            -drive file=win.qcow2,format=qcow2,if=virtio \
            -device virtio-vga \
            -usb -device usb-tablet \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389,hostfwd=tcp::4444-:4444 \
            -nographic -vnc :0 &

          echo "VM Running. Syncing with MEGA: $M_USER"
          sleep 21600 # 6 Hour Session
