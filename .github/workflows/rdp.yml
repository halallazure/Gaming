name: Ultimate-GPU-Gaming-VM
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: GPU & QEMU Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils nvidia-driver-535
          
      - name: Launch Windows
        run: |
          # Download a Lite Windows 10 Image (Direct Link)
          curl -L -o win.qcow2 "https://bit.ly/tinywin10_gpu" 
          
          # Start with GPU Acceleration
          qemu-system-x86_64 \
            -m 8G -smp 4 \
            -drive file=win.qcow2,format=raw \
            -usb -device usb-tablet \
            -device virtio-vga \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389 \
            -vnc :0 &
          
          # This keeps the Action running so it doesn't close
          sleep 21600
