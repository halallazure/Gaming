name: Ultimate-GPU-Gaming-V41-SYNC
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: 1. Install QEMU Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils unzip

      - name: 2. Extract and Convert Image
        run: |
          # Combine all commands into one block to avoid the 'run is defined' error
          echo "Checking for downloaded files..."
          if [ -f "WinDev2407Eval.ova" ]; then
            tar -xvf WinDev2407Eval.ova
            qemu-img convert -f vmdk -O qcow2 *.vmdk win.qcow2
            rm *.vmdk WinDev2407Eval.ova
          else
            echo "OVA file not found. Ensure the download step completed."
          fi

      - name: 3. Boot with GPU & MEGA Sync
        env:
          M_USER: ${{ secrets.MEGA_EMAIL }}
          M_PASS: ${{ secrets.MEGA_PASSWORD }}
        run: |
          qemu-system-x86_64 \
            -m 12G -smp 4 \
            -accel kvm:tcg \
            -cpu host \
            -drive file=win.qcow2,format=qcow2,if=virtio \
            -device virtio-vga \
            -usb -device usb-tablet \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389 \
            -nographic -vnc :0 &
          
          echo "VM Started! Initializing MEGA Sync..."
          sleep 21600
