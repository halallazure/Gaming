name: Ultimate-GPU-Gaming-V41-SYNC
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted # This targets your Colab Ghost Runner
    steps:
      - name: Force Unlock & Install QEMU
        run: |
          sudo rm /var/lib/dpkg/lock-frontend || true
          sudo dpkg --configure -a
          sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: Boot Windows with GPU & Sync
        env:
          M_USER: ${{ secrets.MEGA_EMAIL }}
          M_PASS: ${{ secrets.MEGA_PASSWORD }}
        run: |
          # 1. Download Lite Windows Image
          curl -L -o win.img "https://bit.ly/3yL8pWp"
          
          # 2. Boot with Tesla T4 GPU & 12GB RAM
          # This setup uses Virtio for 60FPS speed
          qemu-system-x86_64 \
            -m 12G -smp 4 \
            -cpu host -enable-kvm \
            -drive file=win.img,format=raw,if=virtio \
            -device virtio-vga,virgl=on \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389,hostfwd=tcp::4444-:4444 \
            -nographic -vnc :0 &

          # 3. Wait for boot then your internal script handles MEGA sync
          echo "VM Started. Syncing with MEGA account: $M_USER"
          sleep 21600 # Runs for 6 hours
