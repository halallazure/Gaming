name: Ultimate-GPU-Gaming-VM
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: 1. Clean Locks & Install QEMU
        run: |
          sudo rm -f /var/lib/dpkg/lock-frontend
          sudo dpkg --configure -a
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: 2. Download Bootable Windows Image
        run: |
          # This is a direct raw image link - no extraction needed
          curl -L -o win.img "https://bit.ly/3yL8pWp"
          
          # Size check: If the file is small, the download failed
          FILESIZE=$(stat -c%s "win.img")
          if [ $FILESIZE -lt 1000000000 ]; then
            echo "Download failed: File size is too small ($FILESIZE bytes)"
            exit 1
          fi

      - name: 3. Launch GPU VM
        run: |
          # Boot using virtio for 60FPS performance
          qemu-system-x86_64 \
            -m 8G \
            -smp 4 \
            -drive file=win.img,format=raw,if=virtio \
            -device virtio-vga \
            -usb -device usb-tablet \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389,hostfwd=tcp::4444-:4444 \
            -nographic -vnc :0 &
          
          # Keep Action running for 6 hours
          sleep 21600
