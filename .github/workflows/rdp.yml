name: Ultimate-GPU-Gaming-V41-SYNC
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: 1. Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: 2. Download Windows Image (MediaFire Direct)
        run: |
          # This command extracts the direct download link from the MediaFire page
          # No 'tar' or 'gdown' needed
          curl -sL $(curl -sL https://www.mediafire.com/file/7z5x9q6v4p1k2n3/win10_gaming.qcow2/file | grep -oE 'https://download[0-9]+\.mediafire\.com/[^"]+') -o win.qcow2
          
          # Check size (Should be ~4GB)
          ls -lh win.qcow2

      - name: 3. Boot with GPU & MEGA Sync
        env:
          M_USER: ${{ secrets.MEGA_EMAIL }}
          M_PASS: ${{ secrets.MEGA_PASSWORD }}
        run: |
          qemu-system-x86_64 \
            -m 12G -smp 4 \
            -accel kvm:tcg \
            -cpu host \
            -drive file=win.qcow2,format=qcow2,if=virtio \
            -device virtio-vga \
            -usb -device usb-tablet \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389,hostfwd=tcp::4444-:4444 \
            -nographic -vnc :0 &

          echo "VM Live. Ready for MEGA Sync: $M_USER"
          sleep 21600 # 6-hour session
