name: Ultimate-GPU-Gaming-VM
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: Install QEMU and Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils
          
      - name: Verify GPU Hardware
        run: nvidia-smi

      - name: Launch Windows with GPU
        run: |
          # Download the image (using -L to follow redirects)
          curl -L -o win.qcow2 https://bit.ly/tinywin10_gpu 
          
          # Start Windows with the correct QEMU command
          qemu-system-x86_64 \
            -m 8G \
            -smp 4 \
            -hda win.qcow2 \
            -device usb-tablet \
            -device virtio-vga \
            -net nic -net user,hostfwd=tcp::3389-:3389 \
            -nographic -vnc :0
