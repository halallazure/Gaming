name: Ultimate-GPU-Gaming-VM
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils
          
      - name: Launch Windows VM
        run: |
          # Downloading a RAW image (No extraction/tar required)
          # This is a specialized 'Tiny10' build for cloud gaming
          curl -L -o win.qcow2 "https://bit.ly/tinywin10_gpu" 
          
          # Check if the file is valid (Should be > 1GB)
          ls -lh win.qcow2

          qemu-system-x86_64 \
            -m 8G -smp 4 \
            -drive file=win.qcow2,format=raw,if=virtio \
            -usb -device usb-tablet \
            -device virtio-vga \
            -vga virtio \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389 \
            -nographic -vnc :0 &
          
          sleep 21600
