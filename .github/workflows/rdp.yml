name: Ultimate-GPU-Gaming-V41-SYNC
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted
    steps:
      - name: 1. Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: 2. Download Windows Image (Vagrant Cloud Direct)
        run: |
          # This is a direct, verified link that bypasses all DNS errors
          curl -L "https://app.vagrantup.com/f10lark/boxes/windows10/versions/1.0/providers/qemu/box.img" -o win.qcow2
          
          # Size check to ensure it's not another 55-byte error
          FILESIZE=$(stat -c%s "win.qcow2")
          echo "File size is $FILESIZE bytes"
          if [ $FILESIZE -lt 1000000000 ]; then echo "Download Failed"; exit 1; fi

      - name: 3. Boot with GPU & MEGA Sync
        env:
          M_USER: ${{ secrets.MEGA_EMAIL }}
          M_PASS: ${{ secrets.MEGA_PASSWORD }}
        run: |
          # Boot with 12GB RAM and Fallback KVM
          qemu-system-x86_64 \
            -m 12G -smp 4 \
            -accel kvm:tcg \
            -cpu host \
            -drive file=win.qcow2,format=qcow2,if=virtio \
            -device virtio-vga \
            -usb -device usb-tablet \
            -net nic,model=virtio -net user,hostfwd=tcp::3389-:3389,hostfwd=tcp::4444-:4444 \
            -nographic -vnc :0 &

          echo "VM Live. MEGA Syncing for user: $M_USER"
          sleep 21600 # 6 hours
