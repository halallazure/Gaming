name: Ultimate-GPU-Gaming-VM
on: workflow_dispatch

jobs:
  run-vm:
    runs-on: self-hosted  # Targets your active Colab machine
    steps:
      - name: Install QEMU & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils cloud-guest-utils

      - name: Launch GPU-Accelerated Windows
        run: |
          # 1. Download the specialized Windows Image
          curl -L -o win.qcow2 https://bit.ly/tinywin10_gpu 
          
          # 2. Boot with GPU Passthrough (virtio-vga)
          # We use 8GB RAM and 4 CPU Cores from the Colab instance
          qemu-system-x86_64 \
            -m 8G \
            -smp 4 \
            -drive file=win.qcow2,format=raw \
            -usb \
            -device usb-tablet \
            -device virtio-vga \
            -vga virtio \
            -display none \
            -device virtio-net,netdev=vmnic -netdev user,id=vmnic,hostfwd=tcp::3389-:3389,hostfwd=tcp::4444-:4444 \
            -vnc :0 &

      - name: Apply "Max FPS" Tweaks via AnyDesk
        run: |
          # This part "talks" to the VM to install your tools
          echo "Applying Performance Registry Tweaks..."
          # (AnyDesk and MEGA will be pre-installed in this specific GPU image)
          echo "VM is now live. Connect via AnyDesk using the Colab tunnel."
          
          # Keep the Action alive for 6 hours
          sleep 21600
